name: Market Insight Indonesia

on:
  schedule:
    - cron: "1 4-23 * * 1-5"   # Senin-Jumat, jam 04:01 - 23:01
    - cron: "1 0-1 * * 6"      # Sabtu, jam 00:01 - 01:01
  workflow_dispatch:

jobs:
  run-system:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Run Market Insight & Ekstrak
        id: market
        env:
          TWELVE_API_KEY: ${{ secrets.TWELVE_API_KEY }}
        run: |
          npm start 2>&1 | tee output.txt
          
          # EKSTRAK HARGA (ambil dari Realtime Price)
          PRICE=$(grep "Price       :" output.txt | head -1 | awk '{print $3}')
          TREND=$(grep "Trend" output.txt | head -1 | awk '{print $2, $3}')
          RSI=$(grep "RSI14" output.txt | head -1 | awk '{print $2}')
          echo "PRICE=$PRICE" >> $GITHUB_ENV
          echo "TREND=$TREND" >> $GITHUB_ENV
          echo "RSI=$RSI" >> $GITHUB_ENV
          
          # EKSTRAK ORDER BLOCK (tanpa echo dobel)
          {
            sed -n '/Order Block/,/FVG Strength/p' output.txt | head -12
          } > orderblock.txt
          echo "ORDERBLOCK<<EOF" >> $GITHUB_ENV
          cat orderblock.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
          # EKSTRAK FVG (tanpa echo dobel)
          {
            sed -n '/Fair Value Gap/,/Datetime/p' output.txt | head -10
          } > fvg.txt
          echo "FVG<<EOF" >> $GITHUB_ENV
          cat fvg.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
          # EKSTRAK AI DECISION (tanpa echo dobel)
          {
            sed -n '/AI MARKET DECISION/,/Confidence/p' output.txt
          } > aidecision.txt
          echo "AIDECISION<<EOF" >> $GITHUB_ENV
          cat aidecision.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
          # EKSTRAK RISK ENGINE (tanpa echo dobel)
          {
            sed -n '/RISK ENGINE/,/Risk Reward/p' output.txt
          } > risk.txt
          echo "RISK<<EOF" >> $GITHUB_ENV
          cat risk.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
          # EKSTRAK ACTION (BUY/SELL PLAN)
          ACTION=$(grep "Action        :" risk.txt | head -1 | sed 's/Action        : //')
          echo "ACTION=$ACTION" >> $GITHUB_ENV
          
          # EKSTRAK REASON (dari RISK ENGINE)
          REASON=$(grep "Reason        :" risk.txt | head -1 | sed 's/Reason        : //')
          echo "REASON=$REASON" >> $GITHUB_ENV
          
          # CEK ADA ENTRY?
          if grep -q "Entry         : -" risk.txt; then
            echo "HAS_ENTRY=false" >> $GITHUB_ENV
          else
            echo "HAS_ENTRY=true" >> $GITHUB_ENV
          fi
          
          # CEK ADA ORDER BLOCK?
          if grep -q "Zone High   : 0" orderblock.txt || grep -q "Status      : Not Found" orderblock.txt; then
            echo "HAS_OB=false" >> $GITHUB_ENV
          else
            echo "HAS_OB=true" >> $GITHUB_ENV
          fi
          
          # CEK ADA FVG?
          if grep -q "High        : 0" fvg.txt || grep -q "Status      : Not Found" fvg.txt; then
            echo "HAS_FVG=false" >> $GITHUB_ENV
          else
            echo "HAS_FVG=true" >> $GITHUB_ENV
          fi

      - name: Dapatkan waktu WIB
        run: echo "CURRENT_TIME=$(TZ=Asia/Jakarta date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

      - name: Kirim NOTIFIKASI (ADA ENTRY)
        if: always() && env.HAS_ENTRY == 'true'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            📊 XAUUSD | ${{ env.PRICE }}
            
            ${{ env.ORDERBLOCK }}
            
            ⚡ ${{ env.ACTION }}
            ${{ env.RISK }}
            
            📌 Reason: ${{ env.REASON }}
            ⏰ ${{ env.CURRENT_TIME }} WIB

      - name: Kirim NOTIFIKASI (TIDAK ADA ENTRY, TAPI ADA OB)
        if: always() && env.HAS_ENTRY == 'false' && env.HAS_OB == 'true'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            📊 XAUUSD | ${{ env.PRICE }} | ${{ env.TREND }}
            
            ${{ env.ORDERBLOCK }}
            
            ${{ env.AIDECISION }}
            
            ⏰ ${{ env.CURRENT_TIME }} WIB

      - name: Kirim NOTIFIKASI (TIDAK ADA ENTRY, OB KOSONG, TAPI ADA FVG)
        if: always() && env.HAS_ENTRY == 'false' && env.HAS_OB == 'false' && env.HAS_FVG == 'true'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            📊 XAUUSD | ${{ env.PRICE }} | ${{ env.TREND }}
            
            ${{ env.FVG }}
            
            ${{ env.AIDECISION }}
            
            ⏰ ${{ env.CURRENT_TIME }} WIB