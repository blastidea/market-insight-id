name: Market Insight Indonesia

on:
  schedule:
    - cron: "1 4-23 * * 1-5"   # Senin-Jumat, jam 04:01 - 23:01
    - cron: "1 0-1 * * 6"      # Sabtu, jam 00:01 - 01:01
  workflow_dispatch:

jobs:
  run-system:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Run Market Insight & Ekstrak
        id: market
        env:
          TWELVE_API_KEY: ${{ secrets.TWELVE_API_KEY }}
        run: |
          npm start 2>&1 | tee output.txt
          
          # Ekstrak ORDER BLOCK
          {
            echo "📊 ORDER BLOCK"
            echo "----------------------------"
            sed -n '/Order Block/,/FVG Strength/p' output.txt | head -12
          } > orderblock.txt
          echo "ORDERBLOCK<<EOF" >> $GITHUB_ENV
          cat orderblock.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
          # Ekstrak AI DECISION
          {
            echo "🎯 AI DECISION"
            echo "----------------------------"
            sed -n '/AI MARKET DECISION/,/Confidence/p' output.txt
          } > aidecision.txt
          echo "AIDECISION<<EOF" >> $GITHUB_ENV
          cat aidecision.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
          # Ekstrak RISK ENGINE (Executive Summary)
          {
            echo "⚡ EXECUTIVE SUMMARY"
            echo "----------------------------"
            sed -n '/RISK ENGINE/,/Risk Reward/p' output.txt
            echo ""
            sed -n '/Status      : WAIT/,/Reason      : /p' output.txt | head -2
          } > risk.txt
          echo "RISK<<EOF" >> $GITHUB_ENV
          cat risk.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
          # Cek apakah ada Entry di RISK ENGINE (bukan "-")
          if grep -q "Entry         : -" risk.txt; then
            echo "HAS_ENTRY=false" >> $GITHUB_ENV
            if grep -q "Zone High   : -" orderblock.txt; then
              echo "HAS_ORDERBLOCK=false" >> $GITHUB_ENV
            else
              echo "HAS_ORDERBLOCK=true" >> $GITHUB_ENV
            fi
          else
            echo "HAS_ENTRY=true" >> $GITHUB_ENV
          fi

      - name: Dapatkan waktu WIB
        run: echo "CURRENT_TIME=$(TZ=Asia/Jakarta date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

      - name: Kirim RISK ENGINE (kalo ada Entry)
        if: always() && env.HAS_ENTRY == 'true'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            📊 MARKET XAUUSD
            
            ⏰ Waktu: ${{ env.CURRENT_TIME }} WIB
            
            ${{ env.RISK }}

      - name: Kirim ORDER BLOCK + AI DECISION (kalo ga ada Entry tapi ada Order Block)
        if: always() && env.HAS_ENTRY == 'false' && env.HAS_ORDERBLOCK == 'true'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            📊 MARKET XAUUSD
            
            ⏰ Waktu: ${{ env.CURRENT_TIME }} WIB
            
            ${{ env.ORDERBLOCK }}
            
            ${{ env.AIDECISION }}
