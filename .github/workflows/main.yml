name: Market Insight Indonesia

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  run-system:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Run Market Insight
        id: market
        env:
          TWELVE_API_KEY: ${{ secrets.TWELVE_API_KEY }}
        run: npm start

      - name: Dapatkan waktu
        run: echo "CURRENT_TIME=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

      - name: Kirim notifikasi ke Telegram
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            📊 Market Insight Indonesia
            
            ✅ Status: ${{ job.status }}
            🕐 Waktu: ${{ env.CURRENT_TIME }}
            📁 Branch: ${{ github.ref_name }}
            
            🔗 Detail: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
